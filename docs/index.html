<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokit - 공부 타이머</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>📚 Pokit</h1>
    <p class="subtitle">공부 시간을 기록하세요</p>

    <!-- 로그인 폼 -->
    <div id="loginForm">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="loginEmail" placeholder="test@test.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="loginPassword" placeholder="6자 이상">
        </div>
        <button onclick="login()">로그인</button>
        <button class="secondary" onclick="showSignup()">회원가입</button>
        <div id="loginMessage" class="message"></div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signupForm" style="display:none;">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="signupEmail" placeholder="test@test.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="signupPassword" placeholder="6자 이상">
        </div>
        <div class="form-group">
            <label>닉네임</label>
            <input type="text" id="signupNickname" placeholder="2~10자">
        </div>
        <button onclick="signup()">회원가입</button>
        <button class="secondary" onclick="showLogin()">로그인으로 돌아가기</button>
        <div id="signupMessage" class="message"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    // Firebase 설정 (Firebase 콘솔에서 확인)
    const firebaseConfig = {
        apiKey: "AIzaSyDntAar-u2RpU5qjVk1eqB8MRyql-TSHOI",
        authDomain: "pokit-7e645.firebaseapp.com",
        projectId: "pokit-7e645",
        storageBucket: "pokit-7e645.firebasestorage.app",
        messagingSenderId: "350973249979",
        appId: "1:350973249979:web:2a27e47f7448e5a81b9c9e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const API_URL = 'https://pokit.up.railway.app';

    window.showSignup = function() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    }

    window.showLogin = function() {
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    }

    function showMessage(id, message, isSuccess) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.className = `message ${isSuccess ? 'success' : 'error'}`;
        el.style.display = 'block';
    }

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            // Firebase로 직접 로그인 → ID 토큰 받기
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const idToken = await userCredential.user.getIdToken();

            localStorage.setItem('token', idToken);
            localStorage.setItem('email', email);
            localStorage.setItem('uid', userCredential.user.uid);

            window.location.href = 'timer.html';
        } catch (e) {
            showMessage('loginMessage', '로그인 실패: ' + e.message, false);
        }
    }

    window.signup = async function() {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const nickname = document.getElementById('signupNickname').value;

        try {
            // 백엔드에 회원가입 요청 (Firebase 계정 생성 + DB 저장)
            const res = await fetch(`${API_URL}/api/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, nickname })
            });

            const result = await res.text();

            if (res.ok) {
                showMessage('signupMessage', '회원가입 성공! 로그인해주세요.', true);
                setTimeout(window.showLogin, 1500);
            } else {
                showMessage('signupMessage', '회원가입 실패: ' + result, false);
            }
        } catch (e) {
            showMessage('signupMessage', '서버 연결 실패', false);
        }
    }
</script>
</body>
</html>
