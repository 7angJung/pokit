<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokit - 공부 타이머</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>📚 Pokit</h1>
    <p class="subtitle">공부 시간을 기록하세요</p>

    <!-- 로그인 폼 -->
    <div id="loginForm">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="loginEmail" placeholder="test@test.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="loginPassword" placeholder="6자 이상">
        </div>
        <button onclick="login()">로그인</button>
        <button class="secondary" onclick="showSignup()">회원가입</button>
        <div id="loginMessage" class="message"></div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signupForm" style="display:none;">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="signupEmail" placeholder="test@test.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="signupPassword" placeholder="6자 이상">
        </div>
        <div class="form-group">
            <label>닉네임</label>
            <input type="text" id="signupNickname" placeholder="2~10자">
        </div>
        <button onclick="signup()">회원가입</button>
        <button class="secondary" onclick="showLogin()">로그인으로 돌아가기</button>
        <div id="signupMessage" class="message"></div>
    </div>
</div>

<script>
    const API_URL = 'https://pokit.up.railway.app';

    function showSignup() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    }

    function showMessage(id, message, isSuccess) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.className = `message ${isSuccess ? 'success' : 'error'}`;
        el.style.display = 'block';
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const token = await res.text();

            if (res.ok) {
                localStorage.setItem('token', token);
                localStorage.setItem('email', email);
                window.location.href = 'timer.html';
            } else {
                showMessage('loginMessage', '로그인 실패: ' + token, false);
            }
        } catch (e) {
            showMessage('loginMessage', '서버 연결 실패', false);
        }
    }

    async function signup() {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const nickname = document.getElementById('signupNickname').value;

        try {
            const res = await fetch(`${API_URL}/api/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, nickname })
            });

            const result = await res.text();

            if (res.ok) {
                showMessage('signupMessage', '회원가입 성공! 로그인해주세요.', true);
                setTimeout(showLogin, 1500);
            } else {
                showMessage('signupMessage', '회원가입 실패: ' + result, false);
            }
        } catch (e) {
            showMessage('signupMessage', '서버 연결 실패', false);
        }
    }
</script>
</body>
</html>
