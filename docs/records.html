<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokit - 공부기록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <button class="logout-btn" onclick="logout()">로그아웃</button>

    <div class="nav">
        <a href="timer.html">⏱ 타이머</a>
        <a href="records.html" class="active">📊 기록</a>
    </div>

    <h1>📊 공부 기록</h1>
    <p class="subtitle" id="userEmail"></p>

    <div class="stat-card">
        <div>
            <div class="stat-label">오늘 공부시간</div>
        </div>
        <div class="stat-value" id="todayMinutes">-</div>
    </div>
    <div class="stat-card">
        <div>
            <div class="stat-label">이번 주 공부시간</div>
        </div>
        <div class="stat-value" id="weeklyMinutes">-</div>
    </div>
    <div class="stat-card">
        <div>
            <div class="stat-label">이번 달 공부시간</div>
        </div>
        <div class="stat-value" id="monthlyMinutes">-</div>
    </div>

    <div class="divider">전체 기록</div>

    <div id="recordsList"></div>
    <div id="recordsMessage" class="message"></div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDntAar-u2RpU5qjVk1eqB8MRyql-TSHOI",
        authDomain: "pokit-7e645.firebaseapp.com",
        projectId: "pokit-7e645",
        storageBucket: "pokit-7e645.firebasestorage.app",
        messagingSenderId: "350973249979",
        appId: "1:350973249979:web:2a27e47f7448e5a81b9c9e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const API_URL = 'https://pokit.up.railway.app';

    function formatMinutes(minutes) {
        if (minutes >= 60) {
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
        }
        return `${minutes}분`;
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        document.getElementById('userEmail').textContent = user.email;

        try {
            const idToken = await user.getIdToken(true);
            const firebaseUid = user.uid;
            const headers = { 'Authorization': `Bearer ${idToken}` };

            const [todayRes, weeklyRes, monthlyRes, recordsRes] = await Promise.all([
                fetch(`${API_URL}/api/timer/today/${firebaseUid}`, { headers }),
                fetch(`${API_URL}/api/timer/weekly/${firebaseUid}`, { headers }),
                fetch(`${API_URL}/api/timer/monthly/${firebaseUid}`, { headers }),
                fetch(`${API_URL}/api/timer/records/${firebaseUid}`, { headers })
            ]);

            const today = await todayRes.json();
            const weekly = await weeklyRes.json();
            const monthly = await monthlyRes.json();
            const records = await recordsRes.json();

            document.getElementById('todayMinutes').textContent = formatMinutes(today);
            document.getElementById('weeklyMinutes').textContent = formatMinutes(weekly);
            document.getElementById('monthlyMinutes').textContent = formatMinutes(monthly);

            const list = document.getElementById('recordsList');
            if (records.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#aaa; padding:20px;">기록이 없어요</p>';
            } else {
                list.innerHTML = records.map(r => `
                        <div class="record-item">
                            <div>
                                <div style="font-weight:600;">${formatMinutes(r.studyMinutes)} 공부</div>
                                <div class="record-date">${formatDate(r.startTime)} ~ ${formatDate(r.endTime)}</div>
                            </div>
                            <div style="font-size:24px;">📖</div>
                        </div>
                    `).join('');
            }

        } catch (e) {
            const el = document.getElementById('recordsMessage');
            el.textContent = '데이터 로딩 실패';
            el.className = 'message error';
            el.style.display = 'block';
        }
    });

    window.logout = async function() {
        await signOut(auth);
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
